name: Deploy to Posit Connect

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
      CONNECT_ACCOUNT: ${{ secrets.CONNECT_ACCOUNT }}
      CONNECT_TOKEN: ${{ secrets.CONNECT_TOKEN }}
      CONNECT_SECRET: ${{ secrets.CONNECT_SECRET }}
      CONNECT_APPNAME: ${{ secrets.CONNECT_APPNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            rsconnect
            shiny
            dplyr
            readr
            stringr
            ggplot2
            lubridate
            httr
            jsonlite
            xml2
          needs: |
            rsconnect

      - name: Deploy to Posit Connect
        run: |
          Rscript -e "rsconnect::setAccountInfo(name=Sys.getenv('CONNECT_ACCOUNT'), token=Sys.getenv('CONNECT_TOKEN'), secret=Sys.getenv('CONNECT_SECRET'), server=Sys.getenv('CONNECT_SERVER'))"
          Rscript -e "rsconnect::deployApp(appDir='final-project', appName=Sys.getenv('CONNECT_APPNAME'), account=Sys.getenv('CONNECT_ACCOUNT'), server=Sys.getenv('CONNECT_SERVER'), forceUpdate=TRUE)"
